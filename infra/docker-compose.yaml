networks:
  app_net:
    driver: bridge
services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root1234
      - TZ=Asia/Shanghai
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_general_ci
      - MYSQL_ROOT_HOST=%
    ports:
      - "3306:3306"
    privileged: true
    command:
      - "--server-id=1"
      - "--log-bin=mysql-bin"
      - "--binlog-format=row"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    restart: always
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:4.0.6-management
    ports:
      - "5672:5672"
      - "15672:15672"
    privileged: true
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_net
    restart: always
  nacos:
    container_name: nacos
    image: nacos/nacos-server:v3.2.0
    ports:
      - "8848:8848"
      - "8080:8080"
      - "9848:9848"
      - "9849:9849"
    environment:
      - TZ=Asia/Shanghai
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - NACOS_AUTH_IDENTITY_KEY=2222
      - NACOS_AUTH_IDENTITY_VALUE=2xxx
      - NACOS_AUTH_TOKEN=VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8848/nacos" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_net
    privileged: true
    restart: always
  rocketmq-namesrv:
    container_name: rocketmq-namesrv
    image: apache/rocketmq:5.3.4
    ports:
      - "9876:9876"
    command: [ "sh", "mqnamesrv" ]
    networks:
      - app_net
    restart: always
  rocketmq-broker:
    container_name: rocketmq-broker
    image: apache/rocketmq:5.3.4
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    command: [ "sh", "mqbroker", "-n", "rocketmq-namesrv:9876", "-c", "/home/rocketmq/rocketmq-5.3.4/conf/broker.conf" ]
    volumes:
      - ./rocket/conf/broker.conf:/home/rocketmq/rocketmq-5.3.4/conf/broker.conf
    networks:
      - app_net
    restart: always
  rocketmq-dashboard:
    container_name: rocketmq-dashboard
    image: apacherocketmq/rocketmq-dashboard:latest
    depends_on:
      - rocketmq-namesrv
      - rocketmq-broker
    ports:
      - "8081:8082"
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=rocketmq-namesrv:9876
    networks:
      - app_net
    restart: always
