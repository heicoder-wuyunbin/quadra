server.port=18080
spring.application.name=quadra-gateway

# Nacos Discovery Configuration
spring.cloud.nacos.discovery.server-addr=localhost:8848
spring.cloud.nacos.discovery.namespace=public
spring.cloud.nacos.discovery.username=nacos
spring.cloud.nacos.discovery.password=nacos

# Spring Cloud Gateway Routes
spring.cloud.gateway.server.webflux.routes[0].id=quadra-user
spring.cloud.gateway.server.webflux.routes[0].uri=lb://quadra-user
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webflux.routes[1].id=quadra-content
spring.cloud.gateway.server.webflux.routes[1].uri=lb://quadra-content
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/content/**

spring.cloud.gateway.server.webflux.routes[2].id=quadra-interaction
spring.cloud.gateway.server.webflux.routes[2].uri=lb://quadra-interaction
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/interactions/**

spring.cloud.gateway.server.webflux.routes[3].id=quadra-recommend
spring.cloud.gateway.server.webflux.routes[3].uri=lb://quadra-recommend
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/recommends/**

spring.cloud.gateway.server.webflux.routes[4].id=quadra-social
spring.cloud.gateway.server.webflux.routes[4].uri=lb://quadra-social
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/social/**

spring.cloud.gateway.server.webflux.routes[5].id=quadra-system
spring.cloud.gateway.server.webflux.routes[5].uri=lb://quadra-system
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/system/**

# 管理后台的消息推送/模板等目前落在 system 服务（缺独立 message 服务时用于兜底）
spring.cloud.gateway.server.webflux.routes[6].id=quadra-message-stub
spring.cloud.gateway.server.webflux.routes[6].uri=lb://quadra-system
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/message/**

# 运维监控相关接口目前落在 system 服务（缺独立 monitor 服务时用于兜底）
spring.cloud.gateway.server.webflux.routes[7].id=quadra-monitor-stub
spring.cloud.gateway.server.webflux.routes[7].uri=lb://quadra-system
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/monitor/**

# 兼容：如果外部仍带 /api 前缀，则在网关侧去掉 /api 再转发（避免路径不一致导致 404）
spring.cloud.gateway.server.webflux.routes[8].id=quadra-user-api
spring.cloud.gateway.server.webflux.routes[8].uri=lb://quadra-user
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webflux.routes[8].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[9].id=quadra-content-api
spring.cloud.gateway.server.webflux.routes[9].uri=lb://quadra-content
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/content/**
spring.cloud.gateway.server.webflux.routes[9].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[10].id=quadra-interaction-api
spring.cloud.gateway.server.webflux.routes[10].uri=lb://quadra-interaction
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/api/interactions/**
spring.cloud.gateway.server.webflux.routes[10].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[11].id=quadra-recommend-api
spring.cloud.gateway.server.webflux.routes[11].uri=lb://quadra-recommend
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/api/recommends/**
spring.cloud.gateway.server.webflux.routes[11].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[12].id=quadra-social-api
spring.cloud.gateway.server.webflux.routes[12].uri=lb://quadra-social
spring.cloud.gateway.server.webflux.routes[12].predicates[0]=Path=/api/social/**
spring.cloud.gateway.server.webflux.routes[12].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[13].id=quadra-system-api
spring.cloud.gateway.server.webflux.routes[13].uri=lb://quadra-system
spring.cloud.gateway.server.webflux.routes[13].predicates[0]=Path=/api/system/**
spring.cloud.gateway.server.webflux.routes[13].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[14].id=quadra-message-api-stub
spring.cloud.gateway.server.webflux.routes[14].uri=lb://quadra-system
spring.cloud.gateway.server.webflux.routes[14].predicates[0]=Path=/api/message/**
spring.cloud.gateway.server.webflux.routes[14].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[15].id=quadra-monitor-api-stub
spring.cloud.gateway.server.webflux.routes[15].uri=lb://quadra-system
spring.cloud.gateway.server.webflux.routes[15].predicates[0]=Path=/api/monitor/**
spring.cloud.gateway.server.webflux.routes[15].filters[0]=StripPrefix=1

# OpenAPI docs routes (proxy to downstream services)
spring.cloud.gateway.server.webflux.routes[16].id=quadra-user-openapi
spring.cloud.gateway.server.webflux.routes[16].uri=lb://quadra-user
spring.cloud.gateway.server.webflux.routes[16].predicates[0]=Path=/v3/api-docs/quadra-user
spring.cloud.gateway.server.webflux.routes[16].filters[0]=RewritePath=/v3/api-docs/quadra-user,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[17].id=quadra-content-openapi
spring.cloud.gateway.server.webflux.routes[17].uri=lb://quadra-content
spring.cloud.gateway.server.webflux.routes[17].predicates[0]=Path=/v3/api-docs/quadra-content
spring.cloud.gateway.server.webflux.routes[17].filters[0]=RewritePath=/v3/api-docs/quadra-content,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[18].id=quadra-interaction-openapi
spring.cloud.gateway.server.webflux.routes[18].uri=lb://quadra-interaction
spring.cloud.gateway.server.webflux.routes[18].predicates[0]=Path=/v3/api-docs/quadra-interaction
spring.cloud.gateway.server.webflux.routes[18].filters[0]=RewritePath=/v3/api-docs/quadra-interaction,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[19].id=quadra-recommend-openapi
spring.cloud.gateway.server.webflux.routes[19].uri=lb://quadra-recommend
spring.cloud.gateway.server.webflux.routes[19].predicates[0]=Path=/v3/api-docs/quadra-recommend
spring.cloud.gateway.server.webflux.routes[19].filters[0]=RewritePath=/v3/api-docs/quadra-recommend,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[20].id=quadra-social-openapi
spring.cloud.gateway.server.webflux.routes[20].uri=lb://quadra-social
spring.cloud.gateway.server.webflux.routes[20].predicates[0]=Path=/v3/api-docs/quadra-social
spring.cloud.gateway.server.webflux.routes[20].filters[0]=RewritePath=/v3/api-docs/quadra-social,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[21].id=quadra-system-openapi
spring.cloud.gateway.server.webflux.routes[21].uri=lb://quadra-system
spring.cloud.gateway.server.webflux.routes[21].predicates[0]=Path=/v3/api-docs/quadra-system
spring.cloud.gateway.server.webflux.routes[21].filters[0]=RewritePath=/v3/api-docs/quadra-system,/v3/api-docs

# Springdoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.cache.disabled=true

# Swagger UI Multi-Service Configuration
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.urls[0].name=quadra-user
springdoc.swagger-ui.urls[0].url=/v3/api-docs/quadra-user
springdoc.swagger-ui.urls[1].name=quadra-content
springdoc.swagger-ui.urls[1].url=/v3/api-docs/quadra-content
springdoc.swagger-ui.urls[2].name=quadra-interaction
springdoc.swagger-ui.urls[2].url=/v3/api-docs/quadra-interaction
springdoc.swagger-ui.urls[3].name=quadra-recommend
springdoc.swagger-ui.urls[3].url=/v3/api-docs/quadra-recommend
springdoc.swagger-ui.urls[4].name=quadra-social
springdoc.swagger-ui.urls[4].url=/v3/api-docs/quadra-social
springdoc.swagger-ui.urls[5].name=quadra-system
springdoc.swagger-ui.urls[5].url=/v3/api-docs/quadra-system

# Disable Json-to-gRPC filter to avoid gRPC classes loading
spring.cloud.gateway.server.webflux.filter.json-to-grpc.enabled=false

# Actuator Configuration
management.endpoints.web.exposure.include=gateway,health,info
management.endpoint.gateway.access=read-only

# RocketMQ Configuration
rocketmq.name-server=localhost:9876
rocketmq.producer.group=quadra-producer-group
rocketmq.producer.send-message-timeout=3000
rocketmq.producer.retry-times-when-send-failed=2
rocketmq.producer.retry-times-when-send-async-failed=2

# RocketMQ Topics
rocketmq.topic.admin-event=TOPIC_ADMIN_EVENT
rocketmq.topic.user-action=TOPIC_USER_ACTION
rocketmq.topic.content-event=TOPIC_CONTENT_EVENT
rocketmq.topic.social-event=TOPIC_SOCIAL_EVENT
