server.port=18080
spring.application.name=quadra-gateway

# Nacos Discovery Configuration
spring.cloud.nacos.discovery.server-addr=localhost:8848
spring.cloud.nacos.discovery.namespace=public
spring.cloud.nacos.discovery.username=nacos
spring.cloud.nacos.discovery.password=nacos

# Spring Cloud Gateway Routes
spring.cloud.gateway.server.webflux.routes[0].id=quadra-user
spring.cloud.gateway.server.webflux.routes[0].uri=lb://quadra-user
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/v1/users/**

spring.cloud.gateway.server.webflux.routes[1].id=quadra-content
spring.cloud.gateway.server.webflux.routes[1].uri=lb://quadra-content
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/v1/content/**

spring.cloud.gateway.server.webflux.routes[2].id=quadra-interaction
spring.cloud.gateway.server.webflux.routes[2].uri=lb://quadra-interaction
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/v1/interaction/**

spring.cloud.gateway.server.webflux.routes[3].id=quadra-recommend
spring.cloud.gateway.server.webflux.routes[3].uri=lb://quadra-recommend
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/v1/recommend/**

spring.cloud.gateway.server.webflux.routes[4].id=quadra-social
spring.cloud.gateway.server.webflux.routes[4].uri=lb://quadra-social
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/v1/social/**

spring.cloud.gateway.server.webflux.routes[5].id=quadra-system
spring.cloud.gateway.server.webflux.routes[5].uri=lb://quadra-system
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/v1/system/**

# OpenAPI docs routes (proxy to downstream services)
spring.cloud.gateway.server.webflux.routes[6].id=quadra-user-openapi
spring.cloud.gateway.server.webflux.routes[6].uri=lb://quadra-user
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/v3/api-docs/quadra-user
spring.cloud.gateway.server.webflux.routes[6].filters[0]=RewritePath=/v3/api-docs/quadra-user,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[7].id=quadra-content-openapi
spring.cloud.gateway.server.webflux.routes[7].uri=lb://quadra-content
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/v3/api-docs/quadra-content
spring.cloud.gateway.server.webflux.routes[7].filters[0]=RewritePath=/v3/api-docs/quadra-content,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[8].id=quadra-interaction-openapi
spring.cloud.gateway.server.webflux.routes[8].uri=lb://quadra-interaction
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/v3/api-docs/quadra-interaction
spring.cloud.gateway.server.webflux.routes[8].filters[0]=RewritePath=/v3/api-docs/quadra-interaction,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[9].id=quadra-recommend-openapi
spring.cloud.gateway.server.webflux.routes[9].uri=lb://quadra-recommend
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/v3/api-docs/quadra-recommend
spring.cloud.gateway.server.webflux.routes[9].filters[0]=RewritePath=/v3/api-docs/quadra-recommend,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[10].id=quadra-social-openapi
spring.cloud.gateway.server.webflux.routes[10].uri=lb://quadra-social
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/v3/api-docs/quadra-social
spring.cloud.gateway.server.webflux.routes[10].filters[0]=RewritePath=/v3/api-docs/quadra-social,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[11].id=quadra-system-openapi
spring.cloud.gateway.server.webflux.routes[11].uri=lb://quadra-system
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/v3/api-docs/quadra-system
spring.cloud.gateway.server.webflux.routes[11].filters[0]=RewritePath=/v3/api-docs/quadra-system,/v3/api-docs

# Springdoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.cache.disabled=true

# Swagger UI Multi-Service Configuration
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.urls[0].name=quadra-user
springdoc.swagger-ui.urls[0].url=/v3/api-docs/quadra-user
springdoc.swagger-ui.urls[1].name=quadra-content
springdoc.swagger-ui.urls[1].url=/v3/api-docs/quadra-content
springdoc.swagger-ui.urls[2].name=quadra-interaction
springdoc.swagger-ui.urls[2].url=/v3/api-docs/quadra-interaction
springdoc.swagger-ui.urls[3].name=quadra-recommend
springdoc.swagger-ui.urls[3].url=/v3/api-docs/quadra-recommend
springdoc.swagger-ui.urls[4].name=quadra-social
springdoc.swagger-ui.urls[4].url=/v3/api-docs/quadra-social
springdoc.swagger-ui.urls[5].name=quadra-system
springdoc.swagger-ui.urls[5].url=/v3/api-docs/quadra-system

# Disable Json-to-gRPC filter to avoid gRPC classes loading
spring.cloud.gateway.server.webflux.filter.json-to-grpc.enabled=false

# Actuator Configuration
management.endpoints.web.exposure.include=gateway,health,info
management.endpoint.gateway.access=read-only

# RocketMQ Configuration
rocketmq.name-server=localhost:9876
rocketmq.producer.group=quadra-producer-group
rocketmq.producer.send-message-timeout=3000
rocketmq.producer.retry-times-when-send-failed=2
rocketmq.producer.retry-times-when-send-async-failed=2

# RocketMQ Topics
rocketmq.topic.admin-event=TOPIC_ADMIN_EVENT
rocketmq.topic.user-action=TOPIC_USER_ACTION
rocketmq.topic.content-event=TOPIC_CONTENT_EVENT
rocketmq.topic.social-event=TOPIC_SOCIAL_EVENT
